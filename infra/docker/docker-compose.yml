name: ecg_pro

services:
  postgres:
    image: postgres:17-alpine
    container_name: ecg_pro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecg_pro}
      POSTGRES_USER: ${POSTGRES_USER:-ecg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecg_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: ecg_pro_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ecgminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ecgminio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./minio_data:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: ecg_pro_api
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-ECG Pro API}
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      APP_DEBUG: ${APP_DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-change-me-please-use-a-32-character-secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ecg_user:ecg_pass@postgres:5432/ecg_pro}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/app/storage}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      MINIO_BUCKET: ${MINIO_BUCKET:-ecg-assets}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ../../services/api:/app
      - ../../services/api/storage:/app/storage
    depends_on:
      - postgres
      - minio

  nginx:
    image: nginx:1.27-alpine
    container_name: ecg_pro_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/html/user:/usr/share/nginx/html/user:ro
      - ../nginx/html/admin:/usr/share/nginx/html/admin:ro
    depends_on:
      - api
