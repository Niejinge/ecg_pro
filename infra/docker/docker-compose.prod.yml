name: ecg_pro

services:
  postgres:
    image: postgres:17-alpine
    container_name: ecg_pro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecg_pro}
      POSTGRES_USER: ${POSTGRES_USER:-ecg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ${ECG_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecg_user} -d ${POSTGRES_DB:-ecg_pro}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: ecg_pro_api
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-ECG Pro API}
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_RELOAD: "false"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ecg_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ecg_pro}
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/storage
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?BOOTSTRAP_ADMIN_PASSWORD is required}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-ECG Pro Admin}
    volumes:
      - ${ECG_STORAGE_DIR:-./data/storage}:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      args:
        ECG_API_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
    container_name: ecg_pro_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
